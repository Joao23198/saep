<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Cadastro de Produto</title>
  <link rel="stylesheet" href="cadastro.css">
</head>
<body>
  <header>
    <h2>Cadastro de Produto</h2>
    <nav>
      <a href="../principal/principal.html">Voltar</a>
    </nav>
  </header>

  <main>
    <form id="produtoForm">
      <input type="text" id="nome" placeholder="Nome do produto" required>
      <input type="text" id="descricao" placeholder="Descrição" required>
      <input type="number" id="estoqueMinimo" placeholder="Estoque mínimo" required>
      <input type="number" id="quantidadeAtual" placeholder="Quantidade atual" required>
      <button type="submit">Salvar</button>
      <button type="button" id="excluirBtn">Excluir</button>
    </form>

    <h3>Lista de Produtos</h3>
    <input type="text" id="busca" placeholder="Buscar produto...">
    <table id="tabelaProdutos">
      <thead>
        <tr>
          <th>Nome</th>
          <th>Descrição</th>
          <th>Estoque Mínimo</th>
          <th>Quantidade Atual</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </main>

  <script src="cadastro.js"></script>
</body>
</html>
